name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Ensure the Prisma client is generated. The postinstall hook in
      # packages/db should handle this, but pnpm sometimes silently skips
      # dep-script execution on CI; running it explicitly is a belt-and-
      # suspenders guarantee that the workspace's TypeScript types resolve.
      - run: pnpm --filter @cardinalxchange/db prisma:generate

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
